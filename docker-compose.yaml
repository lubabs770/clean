services:
  api:
    image: node:23-alpine
    working_dir: /app
    # Install git, clone the repo, and start the server
    command: >
      sh -c "
        apk add --no-cache git &&
        git clone https://github.com/lubabs770/clean.git . &&
        cd server &&
        npm install &&
        node server.js /music
      "
    ports:
      - "3001:3001"
    volumes:
      # Mount your local music directory here. Change the path on the left
      # to wherever your music files are stored on your machine.
      # E.g., /Users/you/Music or /home/you/Music or C:\Users\you\Music (Windows)
      - /path/to/your/music:/music
    environment:
      NODE_ENV: production

  ui:
    image: node:23-alpine
    working_dir: /app
    # Install git, clone the repo, build the frontend
    command: >
      sh -c "
        apk add --no-cache git &&
        git clone https://github.com/lubabs770/clean.git . &&
        cd front &&
        npm install &&
        npm install -g typescript &&
        npm run build &&
        npm install -g serve &&
        serve -s dist -l 5173
      "
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: http://localhost:3001/api
      NODE_ENV: production
